name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Run smoke accessibility tests
        run: npm run test:smoke -- --project=chromium
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://opensource-demo.orangehrmlive.com' }}
          ADMIN_USER: ${{ secrets.ADMIN_USER || 'Admin' }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS || 'admin123' }}

      - name: Run full WCAG 2.1 AA suite
        run: npm run test:wcag2aa -- --project=chromium
        if: success()
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://opensource-demo.orangehrmlive.com' }}
          ADMIN_USER: ${{ secrets.ADMIN_USER || 'Admin' }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS || 'admin123' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-a11y-report
          path: playwright-report/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
